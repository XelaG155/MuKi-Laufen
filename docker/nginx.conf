user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    client_max_body_size 2m;
    server_tokens      off;
    access_log         /dev/stdout;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    server {
        listen 80 default_server;
        server_name _;
        root /var/www/html;
        index index.html;

        # HTML: nie cachen — Browser holt immer aktuelle Version
        # (Asset-URLs sind versions-stamped, daher reicht frisches HTML zum Cache-Bust)
        location ~* \.html?$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            expires off;
        }

        # Root „/" auch nicht cachen (liefert index.html)
        location = / {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            expires off;
            try_files /index.html =404;
        }

        # Cache fuer statische Assets (versions-stamped via ?v=x.y in HTML)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # PHP-Handler
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 30s;
        }

        # Sensible Pfade verbieten
        location ~ /\.                              { deny all; access_log off; log_not_found off; }
        location ^~ /docker/                        { deny all; }
        location ^~ /logs/                          { deny all; }
        location ~ /(composer\.(json|lock)|Dockerfile|docker-compose\.ya?ml)$ { deny all; }
        location ~ \.(env|ini|log|sh|sql|bak)$      { deny all; }

        # Fallback
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
